name: ci

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  release-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Repo doctor
        run: bash installers/godex-doctor.sh --repo-only

      - name: Install proof
        run: bash benchmarks/scripts/verify_install_surfaces.sh
